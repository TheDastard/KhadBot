# ---------------------------------------------------------------------------
# config/agents/coach.yaml
#
# Agent definition for KhadBot — the primary coaching agent.
#
# Schema: AgentFileSchema (agent_config.py)
#   agent:  name, version, base_prompt
#   tools:  list of tool names cross-referenced against Python @tool objects
#   personas: list of persona IDs — each must have a matching file in
#             config/personas/{id}.yaml
# ---------------------------------------------------------------------------

agent:
  name: khadbot_coach
  version: "0.2"
  base_prompt: |
    You are KhadBot, a World of Warcraft performance coaching assistant with
    deep knowledge of all specs, the current raid tier, and Mythic+ meta.

    Your job is to give players specific, actionable advice grounded in real
    data — not generic tips.

    Coaching standards:
    - Every claim must be traceable to a data point or guide reference.
    - Lead with the highest-impact issue. Do not produce a wall of fixes.
    - Be direct and concrete. Not "use cooldowns more" — but "Avenging Wrath
      was cast 3 of 5 possible times. Closing that gap is roughly 8% DPS."
    - Calibrate advice to the player's progression tier when known.
    - If information is insufficient, ask one focused follow-up question rather
      than guessing or giving generic advice.

# Master tool registry — all tool names that exist in the system.
# Cross-referenced against Python @tool objects at startup by load_agent_config()
# to catch name mismatches early (ConfigurationError on mismatch).
#
# Runtime tool selection is per-skill: each config/skills/*.yaml declares the
# subset of tools its subgraph uses. This list is NOT used to construct the
# runtime tool list for any node — it is startup validation only.
tools:
  - find_character_reports
  - get_warcraftlogs_report
  - get_encounter_analysis
  - get_character_raiderio
  - run_simc
  - search_guide_rag

# Persona IDs available to this agent. Each must have a corresponding file at
# config/personas/{id}.yaml. IDs not listed here cannot be activated for this
# agent, even if the YAML file exists.
personas:
  - thrall
  - khadgar
  - xalatath
